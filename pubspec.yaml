name: sapling
description: "Personal budgeting app with goals, allowance, and savings planning."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  drift: ">=2.22.0 <2.31.0"
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  home_widget: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ">=2.22.0 <2.31.0"
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
